<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Global Manager</title>
    <style>
        :root { 
            --bg: #020617; --panel: #0f172a; --accent: #38bdf8; --text: #f8fafc; 
            --gold: #fbbf24; --danger: #ef4444; --green: #22c55e;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #070e1e; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .stat-card { background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155; }
        .balance { font-size: 18px; color: var(--green); font-weight: bold; margin-top: 5px; }
        .main { flex: 1; padding: 20px; overflow-y: auto; background: radial-gradient(circle at top, #111827, #020617); }
        .box { background: #0f172a; border-radius: 12px; padding: 15px; border: 1px solid #1e293b; margin-bottom: 15px; }
        .view { display: none; } .view.active { display: block; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #070e1e; padding: 5px; border-radius: 10px; }
        .tab-btn { padding: 10px; border: none; background: none; color: #94a3b8; cursor: pointer; border-radius: 6px; flex: 1; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #000; }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 8px; color: #94a3b8; border-bottom: 1px solid #1e293b; }
        td { padding: 8px; border-bottom: 1px solid #0f172a; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 6px; box-sizing: border-box; }
        .ucl-card { background: linear-gradient(135deg, #0a1128, #1e40af); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .action-btn { padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 10px; }
        .buy { background: var(--green); color: white; }
        .sell { background: var(--danger); color: white; }
        .bracket-match { background: #1e293b; margin: 5px 0; padding: 8px; border-radius: 4px; border-left: 2px solid var(--gold); font-size: 11px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent); margin:0;">UFG 2026</h2>
    <div class="stat-card">
        <div id="ui-my-club" style="font-weight: bold; color: var(--accent);">Загрузка...</div>
        <div id="ui-balance" class="balance">0 €</div>
    </div>
    <div class="stat-card">
        <div id="ui-week" style="font-weight: bold;">НЕДЕЛЯ: 1</div>
        <div id="ui-event" style="font-size:11px; color: var(--gold); margin-top:5px;">Сезон активен</div>
    </div>
    <button id="next-btn" class="btn" onclick="handleTurn()">СЛЕДУЮЩИЙ ТУР</button>
    <button class="btn" style="background:#334155; color:white; margin-top:auto;" onclick="resetGame()">СБРОСИТЬ ИГРУ</button>
</div>

<div class="main">
    <div id="start-screen" class="box" style="display:none; max-width:400px; margin: 40px auto;">
        <h3 style="text-align: center;">НАЧАЛО КАРЬЕРЫ</h3>
        <select id="start-league" onchange="syncClubs()"></select>
        <select id="start-club"></select>
        <button class="btn" onclick="startGame()">НАЧАТЬ</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div class="tabs">
            <button class="tab-btn active" onclick="tab('home', this)">СОСТАВ</button>
            <button class="tab-btn" onclick="tab('market', this)">РЫНОК</button>
            <button class="tab-btn" onclick="tab('world', this)">ТАБЛИЦЫ</button>
            <button class="tab-btn" onclick="tab('euro', this)" style="color:var(--gold)">UCL</button>
        </div>

        <div id="v-home" class="view active"><div class="box"><h3>Мой состав</h3><table id="lineup-table"></table></div></div>
        <div id="v-market" class="view"><div class="box"><h3>Рынок</h3><div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;"><input type="text" id="m-name" placeholder="Фамилия..." oninput="searchPlayers()"><input type="number" id="m-min-rtg" placeholder="Мин. РТГ" oninput="searchPlayers()"><select id="m-league" onchange="searchPlayers()"><option value="">Все лиги</option></select></div><table id="market-results"></table></div></div>
        <div id="v-world" class="view"><div class="box"><select id="w-league" onchange="updateWorldTable()"></select><table id="world-table"></table></div></div>
        <div id="v-euro" class="view"><div id="ucl-content"></div></div>
    </div>
</div>

<script>
// Данные REAL_DATA и LEAGUES_CONFIG остаются прежними
const REAL_DATA = { 
    "Зенит": {gk:["Латышонок"], def:["Нино","Сантос","Эракович","Адамов","Чистяков"], mid:["Вендел","Клаудиньо","Барриос","Глушенков","Мостовой"], att:["Кассьерра","Соболев","Педро"]}, 
    "Спартак": {gk:["Максименко"], def:["Бабич","Чернов","Денисов","Рябчук"], mid:["Барко","Мартинс","Зобнин","Пруцев"], att:["Угальде","Бонгонда","Маркиньос"]}, 
    "Краснодар": {gk:["Агкацев"], def:["Тормена","Коста","Оласа","Петров"], mid:["Сперцян","Черников","Кривцов","Пина"], att:["Кордоба","Виктор Са","Батчи"]}, 
    "ЦСКА": {gk:["Акинфеев"], def:["Роша","Дивеев","Мойзес","Келлвен"], mid:["Обляков","Зделар","Кисляк","Файзуллаев"], att:["Мусаев","Гуарирапа"]}, 
    "Авангард": {gk:["Ташаев"], def:["Кумсаров","Сухарев","Седов","Некрасов"], mid:["Свободчиков","Коньшин","Борисов"], att:["Хребтов","Захаров","Князев"]}, 
    "Ман Сити": {gk:["Эдерсон"], def:["Диаш","Гвардиол","Аканджи","Уокер"], mid:["Родри","Де Брюйне","Фоден","Бернарду"], att:["Холанд","Грилиш","Доку"]}, 
    "Арсенал": {gk:["Райя"], def:["Салиба","Габриэль","Уайт","Тимбер"], mid:["Эдегор","Райс","Мерино","Парти"], att:["Сака","Хавертц","Мартинелли"]}, 
    "Ливерпуль": {gk:["Алиссон"], def:["Ван Дейк","Конате","Трент","Робертсон"], mid:["Мак Аллистер","Собослаи","Гравенберх"], att:["Салах","Нуньес","Диас"]}, 
    "Челси": {gk:["Санчес"], def:["Колуилл","Фофана","Кукурелья","Джеймс"], mid:["Энцо","Кайседо","Палмер","Нету"], att:["Джексон","Феликс","Мадуэке"]}, 
    "Реал Мадрид": {gk:["Куртуа"], def:["Рюдигер","Милитао","Карвахаль","Менди"], mid:["Беллингем","Вальверде","Модрич","Чуамени"], att:["Мбаппе","Винисиус","Родриго"]}, 
    "Барселона": {gk:["Тер Штеген"], def:["Кубарси","Мартинес","Кунде","Бальде"], mid:["Педри","Гави","Ольмо","Де Йонг"], att:["Левандовски","Ямаль","Рафинья"]}, 
    "Атлетико": {gk:["Облак"], def:["Хименес","Ле Норман","Вицель","Молина"], mid:["Галлахер","Де Пауль","Коке","Льоренте"], att:["Гризманн","Альварес","Серлот"]}, 
    "Бавария": {gk:["Нойер"], def:["Упамекано","Ким","Дэвис","Геррейру"], mid:["Киммих","Мусиала","Павлович","Лаймер"], att:["Кейн","Сане","Гнабри"]}, 
    "Байер": {gk:["Градецки"], def:["Та","Тапсоба","Инкапье","Гримальдо"], mid:["Виртц","Джака","Андрих","Фримпонг"], att:["Бонифасе","Шик","Адли"]}, 
    "Боруссия Д": {gk:["Кобель"], def:["Шлоттербек","Антон","Рюэрсон","Бенсебаини"], mid:["Брандт","Джан","Забитцер","Гросс"], att:["Гирасси","Мален","Адейеми"]}, 
    "Интер": {gk:["Зоммер"], def:["Бастони","Павар","Ачерби","Димарко"], mid:["Барелла","Чалханоглу","Мхитарян"], att:["Лаутаро","Тюрам","Тареми"]}, 
    "Ювентус": {gk:["Ди Грегорио"], def:["Бремер","Гатти","Камбиазо","Данило"], mid:["Копмейнерс","Дуглас Луис","Локателли"], att:["Влахович","Йилдиз","Консейсау"]}, 
    "Милан": {gk:["Меньян"], def:["Томори","Павлович","Эрнандес","Эмерсон"], mid:["Рейндерс","Фофана","Лофтус-Чук"], att:["Леау","Мората","Пулишич"]}, 
    "ПСЖ": {gk:["Доннарумма"], def:["Маркиньос","Хакими","Мендеш","Лукас Эрнандес"], mid:["Заир-Эмери","Витинья","Невеш","Фабиан Руис"], att:["Дембеле","Барколя","Коло-Муани"]}, 
    "Монако": {gk:["Кен"], def:["Керер","Салису","Вандерсон","Кайо Энрике"], mid:["Головин","Закария","Камара","Минамино"], att:["Эмболо","Балогун"]}
};

const LEAGUES_CONFIG = {
    "РПЛ": {base: 74, teams: ["Зенит","Краснодар","Спартак","Динамо М","Локомотив","ЦСКА","Ростов","Рубин","Крылья Советов","Ахмат","Пари НН","Оренбург","Факел","Акрон","Химки","Динамо Мх"]},
    "ФНЛ": {base: 65, teams: ["Балтика","Сочи","Урал","Торпедо М","Родина","Енисей","Шинник","Арсенал Тула","Нефтехимик","КАМАЗ","Тюмень","СКА-Хабаровск","Чайка","Ротор","Уфа","Черноморец","Сокол","Алания"]},
    "Вторая Лига А": {base: 58, teams: ["Велес","Ленинградец","Волгарь","Авангард","Сибирь","Кубань","Текстильщик","Челябинск","Калуга","Спартак Кострома"]},
    "Вторая Лига Б": {base: 52, teams: ["Динамо Киров","Рубин-2","Амкар","Зенит Пенза","Коломна","Знамя Труда","Строгино","Квант","Сатурн","Тверь"]},
    "АПЛ": {base: 83, teams: ["Ман Сити","Ливерпуль","Арсенал","Челси","Ман Юнайтед","Тоттенхэм"]},
    "Ла Лига": {base: 82, teams: ["Реал Мадрид","Барселона","Атлетико","Вильярреал","Севилья"]},
    "Бундеслига": {base: 81, teams: ["Бавария","Байер","Боруссия Д","Лейпциг","Айнтрахт"]},
    "Серия А": {base: 81, teams: ["Интер","Ювентус","Милан","Наполи","Рома"]},
    "Лига 1": {base: 80, teams: ["ПСЖ","Монако","Марсель","Лион","Лилль"]}
};

let game = { club: "", league: "", balance: 30000000, week: 1, year: 2026, world: [], ucl: null };

function save() { localStorage.setItem('ufg_save_v6', JSON.stringify(game)); }
function load() {
    const s = localStorage.getItem('ufg_save_v6');
    if(s) { game = JSON.parse(s); document.getElementById('game-ui').style.display='block'; updateUI(); }
    else { document.getElementById('start-screen').style.display='block'; }
}

function getPrice(rtg) { return Math.floor(Math.pow(rtg/10, 5) * 1200); }

function generateSquad(teamName, leagueName) {
    let conf = LEAGUES_CONFIG[leagueName];
    let squad = [];
    let source = REAL_DATA[teamName] || {};
    ["GK", "DEF", "MID", "ATT"].forEach(pos => {
        let players = source[pos.toLowerCase()] || ["Игрок " + pos];
        players.forEach(name => {
            squad.push({ id: Math.random(), name, pos, rating: conf.base + (REAL_DATA[teamName] ? 5 : 0) + Math.floor(Math.random()*6), club: teamName, league: leagueName });
        });
    });
    while(squad.length < 15) squad.push({ id: Math.random(), name: "Резерв", pos: "MID", rating: conf.base, club: teamName, league: leagueName });
    return squad;
}

function startGame() {
    game.league = document.getElementById('start-league').value;
    game.club = document.getElementById('start-club').value;
    game.world = [];
    for(let lName in LEAGUES_CONFIG) {
        let clubs = LEAGUES_CONFIG[lName].teams.map(name => ({ name, pts: 0, squad: generateSquad(name, lName) }));
        game.world.push({ name: lName, clubs, max: (clubs.length-1)*2, current: 0 });
    }
    initUCL(true); save(); location.reload();
}

function initUCL(first = false) {
    let pool = [];
    if(first) {
        ["АПЛ","Ла Лига","Бундеслига","РПЛ"].forEach(ln => {
            let l = game.world.find(x => x.name === ln);
            if(l) pool.push(...l.clubs.slice(0, 4));
        });
    } else {
        game.world.forEach(l => { if(l.clubs.length >= 4) pool.push(...[...l.clubs].sort((a,b)=>b.pts-a.pts).slice(0, 2)); });
    }
    let selected = pool.slice(0, 16).sort(()=>Math.random()-0.5);
    let groups = [[],[],[],[]];
    selected.forEach(team => {
        let teamLeague = game.world.find(l => l.clubs.some(c => c.name === team.name)).name;
        for(let g of groups) {
            let hasLeague = g.some(t => game.world.find(l => l.clubs.some(c => c.name === t.name)).name === teamLeague);
            if(g.length < 4 && !hasLeague) { g.push({name: team.name, uPts: 0}); return; }
        }
        for(let g of groups) { if(g.length < 4) { g.push({name: team.name, uPts: 0}); return; } }
    });
    game.ucl = { groups, day: 0, playoff: null };
}

function handleTurn() {
    let totalSeasonMax = Math.max(...game.world.map(l => l.max));
    if(game.week > totalSeasonMax + 12) {
        alert("Сезон завершен!"); game.year++; game.week = 1;
        game.world.forEach(l => { l.current = 0; l.clubs.forEach(c => c.pts = 0); });
        initUCL(); save(); updateUI(); return;
    }

    if (game.week % 4 === 0) {
        simulateUCL();
        document.getElementById('ui-event').innerText = "ТУР UCL";
    } else {
        simulateLeagues();
        document.getElementById('ui-event').innerText = "ТУР ЧЕМПИОНАТА";
    }
    game.week++; save(); updateUI();
}

function simulateLeagues() {
    game.world.forEach(l => {
        if (l.current < l.max) {
            let shuffled = [...l.clubs].sort(() => Math.random() - 0.5);
            for (let i = 0; i < shuffled.length; i += 2) {
                if (!shuffled[i+1]) break; 
                let res = Math.random();
                if (res < 0.33) shuffled[i].pts += 3;
                else if (res < 0.66) shuffled[i+1].pts += 3;
                else { shuffled[i].pts += 1; shuffled[i+1].pts += 1; }
            }
            l.current++;
        }
    });
}

function simulateUCL() {
    if (game.ucl.day < 6) {
        game.ucl.groups.forEach(g => {
            let s = [...g].sort(() => Math.random() - 0.5);
            for (let i = 0; i < s.length; i += 2) {
                let res = Math.random();
                if (res < 0.33) s[i].uPts += 3; else if (res < 0.66) s[i+1].uPts += 3; else { s[i].uPts += 1; s[i+1].uPts += 1; }
            }
        });
        game.ucl.day++;
        if(game.ucl.day === 6) createPlayoff();
    } else if (game.ucl.playoff) {
        simulatePlayoffRound();
    }
}

function createPlayoff() {
    let qualifiers = [];
    game.ucl.groups.forEach(g => {
        let sorted = [...g].sort((a,b)=>b.uPts - a.uPts);
        qualifiers.push(sorted[0], sorted[1]);
    });
    qualifiers.sort(()=>Math.random()-0.5);
    game.ucl.playoff = {
        qf: [ [qualifiers[0], qualifiers[1]], [qualifiers[2], qualifiers[3]], [qualifiers[4], qualifiers[5]], [qualifiers[6], qualifiers[7]] ],
        sf: [], f: [], winner: null
    };
}

function simulatePlayoffRound() {
    let p = game.ucl.playoff;
    const win = (m) => Math.random() > 0.5 ? m[0] : m[1];
    
    if (p.sf.length === 0) {
        let winners = p.qf.map(m => win(m));
        p.sf = [ [winners[0], winners[1]], [winners[2], winners[3]] ];
    } else if (p.f.length === 0) {
        let winners = p.sf.map(m => win(m));
        p.f = [winners[0], winners[1]];
    } else if (!p.winner) {
        p.winner = win(p.f);
        alert("Победитель UCL: " + p.winner.name);
    }
}

function updateUCL() {
    let h = `<h3>UCL Tournament ${game.year}</h3>`;
    if (game.ucl.day < 6) {
        game.ucl.groups.forEach((g,i) => {
            h += `<div class="ucl-card"><b>Группа ${String.fromCharCode(65+i)}</b><table>`;
            [...g].sort((a,b)=>b.uPts-a.uPts).forEach(t => h += `<tr><td>${t.name}</td><td>${t.uPts}</td></tr>`);
            h += `</table></div>`;
        });
    } else if (game.ucl.playoff) {
        let p = game.ucl.playoff;
        h += `<h4>Плей-офф</h4>`;
        h += `<b>1/4 Финала:</b>` + p.qf.map(m => `<div class="bracket-match">${m[0].name} vs ${m[1].name}</div>`).join('');
        if(p.sf.length) h += `<br><b>1/2 Финала:</b>` + p.sf.map(m => `<div class="bracket-match">${m[0].name} vs ${m[1].name}</div>`).join('');
        if(p.f.length) h += `<br><b>ФИНАЛ:</b> <div class="bracket-match" style="background:var(--gold); color:black">${p.f[0].name} vs ${p.f[1].name}</div>`;
        if(p.winner) h += `<h2 style="color:var(--gold); text-align:center">ЧЕМПИОН: ${p.winner.name}</h2>`;
    }
    document.getElementById('ucl-content').innerHTML = h;
}

// Вспомогательные функции (sell, buy, search, updateUI, syncClubs, reset) остаются без изменений
function sellPlayer(id) {
    let myC = game.world.find(l => l.name === game.league).clubs.find(c => c.name === game.club);
    if(myC.squad.length <= 11) { alert("Минимум 11 игроков!"); return; }
    let idx = myC.squad.findIndex(p => p.id === id);
    game.balance += Math.floor(getPrice(myC.squad[idx].rating) * 0.8);
    myC.squad.splice(idx, 1);
    save(); updateUI();
}

function buyPlayer(id, fromClub) {
    let sellerClub;
    game.world.forEach(l => l.clubs.forEach(c => { if(c.name === fromClub) sellerClub = c; }));
    let idx = sellerClub.squad.findIndex(p => p.id === id);
    let p = sellerClub.squad[idx];
    let price = getPrice(p.rating);
    if(game.balance >= price) {
        game.balance -= price;
        let transfered = sellerClub.squad.splice(idx, 1)[0];
        transfered.club = game.club;
        game.world.find(l => l.name === game.league).clubs.find(c => c.name === game.club).squad.push(transfered);
        save(); updateUI(); searchPlayers();
    } else alert("Нет денег!");
}

function searchPlayers() {
    let name = document.getElementById('m-name').value.toLowerCase();
    let minR = document.getElementById('m-min-rtg').value || 0;
    let leg = document.getElementById('m-league').value;
    let res = [];
    game.world.forEach(l => {
        if(!leg || l.name === leg) {
            l.clubs.forEach(c => {
                if(c.name !== game.club) {
                    c.squad.forEach(p => { if(p.rating >= minR && p.name.toLowerCase().includes(name)) res.push(p); });
                }
            });
        }
    });
    let h = `<tr><th>Игрок</th><th>РТГ</th><th>Цена</th><th></th></tr>`;
    res.slice(0,10).forEach(p => {
        h += `<tr><td>${p.name}<br><small>${p.club}</small></td><td>${p.rating}</td><td>${(getPrice(p.rating)/1e6).toFixed(1)}M</td>
        <td><button class="action-btn buy" onclick="buyPlayer(${p.id}, '${p.club}')">Купить</button></td></tr>`;
    });
    document.getElementById('market-results').innerHTML = h;
}

function updateUI() {
    let myC = game.world.find(l => l.name === game.league).clubs.find(c => c.name === game.club);
    document.getElementById('ui-my-club').innerText = game.club;
    document.getElementById('ui-balance').innerText = game.balance.toLocaleString() + " €";
    document.getElementById('ui-week').innerText = `НЕДЕЛЯ: ${game.week}`;
    let h = `<tr><th>Поз</th><th>Имя</th><th>РТГ</th><th>Цена</th><th></th></tr>`;
    myC.squad.sort((a,b)=>b.rating-a.rating).forEach(p => {
        h += `<tr><td>${p.pos}</td><td>${p.name}</td><td>${p.rating}</td><td>${(getPrice(p.rating)/1e6).toFixed(1)}M</td>
        <td><button class="action-btn sell" onclick="sellPlayer(${p.id})">S</button></td></tr>`;
    });
    document.getElementById('lineup-table').innerHTML = h;
    updateWorldTable(); updateUCL();
}

function updateWorldTable() {
    let ln = document.getElementById('w-league').value || game.league;
    let l = game.world.find(x => x.name === ln);
    let h = `<tr><th>#</th><th>КЛУБ</th><th>ОЧКИ</th></tr>`;
    [...l.clubs].sort((a,b)=>b.pts-a.pts).forEach((c,i) => h += `<tr><td>${i+1}</td><td>${c.name}</td><td>${c.pts}</td></tr>`);
    document.getElementById('world-table').innerHTML = h;
}

function syncClubs() {
    let l = document.getElementById('start-league').value;
    let s = document.getElementById('start-club'); s.innerHTML = "";
    LEAGUES_CONFIG[l].teams.forEach(t => s.innerHTML += `<option value="${t}">${t}</option>`);
}

function resetGame() { if(confirm("Сбросить игру?")) { localStorage.clear(); location.reload(); } }

function tab(v, b) {
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.getElementById('v-'+v).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
}

const sl = document.getElementById('start-league');
const wl = document.getElementById('w-league');
const ml = document.getElementById('m-league');
for(let n in LEAGUES_CONFIG) { 
    sl.innerHTML += `<option value="${n}">${n}</option>`; 
    wl.innerHTML += `<option value="${n}">${n}</option>`; 
    ml.innerHTML += `<option value="${n}">${n}</option>`;
}
syncClubs(); load();
</script>
</body>
</html>
